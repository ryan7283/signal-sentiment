
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL — Stock Sentiment Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg:        #04070f;
    --bg2:       #080d18;
    --bg3:       #0c1220;
    --border:    #111827;
    --border2:   #1f2937;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --faint:     #1e293b;
    --accent:    #6366f1;
    --accent2:   #4f46e5;
    --green:     #22c55e;
    --green-bg:  #052e16;
    --green-bd:  #14532d;
    --red:       #ef4444;
    --red-bg:    #3b0000;
    --red-bd:    #7f1d1d;
    --amber:     #f59e0b;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .logo-word {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.06em;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.14em;
    font-weight: 500;
    text-transform: uppercase;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  .last-updated {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── SEARCH BAR ── */
  .search-section {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 440px;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    outline: none;
    transition: border-color 0.15s;
    text-transform: uppercase;
  }
  .search-input::placeholder {
    color: var(--muted);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }
  .search-input:focus { border-color: var(--accent); }
  .btn {
    background: linear-gradient(135deg, var(--accent2), #7c3aed);
    color: #fff;
    border: none;
    padding: 9px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    font-family: var(--sans);
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 9px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    background: var(--bg2);
  }
  .tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    padding: 11px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    font-family: var(--sans);
    transition: color 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── MAIN LAYOUT ── */
  .main { padding: 24px 28px; max-width: 1400px; }

  /* ── STAT STRIP ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
  }
  .stat-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.red   { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .stat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── TICKER GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.12s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card.bullish::before { background: linear-gradient(90deg, var(--green), transparent); opacity: 1; }
  .card.bearish::before { background: linear-gradient(90deg, var(--red), transparent); opacity: 1; }
  .card.neutral-card::before { background: linear-gradient(90deg, var(--amber), transparent); opacity: 1; }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card.selected { border-color: var(--accent); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .ticker-name {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .company-name {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

  /* ── SIGNAL BADGE ── */
  .signal {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 3px;
    display: inline-block;
  }
  .signal-STRONG_BUY  { background: var(--green-bg); color: #4ade80; border: 1px solid var(--green-bd); }
  .signal-BUY         { background: #052e16; color: #86efac; border: 1px solid #166534; }
  .signal-NEUTRAL     { background: #1c1917; color: #a8a29e; border: 1px solid #292524; }
  .signal-SELL        { background: var(--red-bg); color: #fca5a5; border: 1px solid var(--red-bd); }
  .signal-STRONG_SELL { background: #3b0000; color: var(--red); border: 1px solid #450a0a; }
  .signal-LOADING     { background: var(--faint); color: var(--muted); border: 1px solid var(--border2); animation: blink 1.4s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .signal-PENDING     { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .inst-badge { font-size: 9px; font-family: var(--mono); font-weight: 600; }
  .inst-bullish { color: var(--green); }
  .inst-bearish { color: var(--red); }
  .inst-neutral { color: var(--amber); }
  .inst-na      { color: var(--muted); }

  /* ── SCORE BAR ── */
  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .bar-track {
    flex: 1;
    height: 5px;
    background: var(--faint);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bar-fill.green { background: var(--green); }
  .bar-fill.red   { background: var(--red); }
  .bar-fill.amber { background: var(--amber); }
  .score-val {
    font-family: var(--mono);
    font-size: 11px;
    min-width: 38px;
    text-align: right;
  }

  .card-summary {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 10px;
  }
  .themes {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .theme {
    font-size: 9px;
    background: var(--bg3);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    letter-spacing: 0.02em;
  }
  .card-counts {
    display: flex;
    gap: 14px;
    font-size: 10px;
    color: var(--muted);
  }
  .card-counts .g { color: var(--green); }
  .card-counts .r { color: var(--red); }

  .card-inst {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
  }
  .card-inst span b { color: #94a3b8; }

  /* ── UNANALYZED CARD ── */
  .card-empty {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .btn-small {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--accent);
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .btn-small:hover { border-color: var(--accent); background: #1e1b4b22; }

  /* LOADING SHIMMER */
  .shimmer {
    width: 100%;
    height: 5px;
    background: var(--faint);
    border-radius: 3px;
    overflow: hidden;
    margin: 12px 0;
  }
  .shimmer-bar {
    height: 100%;
    width: 45%;
    background: linear-gradient(90deg, var(--accent2), #7c3aed);
    border-radius: 3px;
    animation: shimmy 1.3s ease-in-out infinite;
  }
  @keyframes shimmy { 0%{transform:translateX(-120%)} 100%{transform:translateX(320%)} }

  /* ── DETAIL PANEL ── */
  .detail { max-width: 760px; }
  .detail-back {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 12px; font-family: var(--sans);
    font-weight: 600; padding: 0;
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.15s;
  }
  .detail-back:hover { color: var(--text); }
  .detail-title {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 22px;
  }
  .detail-ticker {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
  }
  .detail-meta { color: var(--muted); font-size: 11px; margin-top: 3px; }

  .detail-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .detail-grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }

  .box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .box-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .box-body {
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.65;
  }
  .box-val {
    font-family: var(--mono);
    font-size: 14px;
    color: #94a3b8;
    font-weight: 600;
  }
  .box-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

  .quote-box {
    background: var(--bg2);
    border-radius: 8px;
    padding: 16px;
    font-size: 12px;
    line-height: 1.65;
    font-style: italic;
  }
  .quote-box.bull { border: 1px solid var(--green-bd); color: #86efac; }
  .quote-box.bear { border: 1px solid var(--red-bd); color: #fca5a5; }

  .inst-box {
    background: var(--bg2);
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    padding: 16px;
    margin-top: 10px;
  }
  .inst-note {
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--bg3);
    border-radius: 5px;
    font-size: 10px;
    color: var(--muted);
  }

  /* ── ANALYZE TAB ── */
  .analyze-wrap { max-width: 640px; }
  .analyze-wrap h3 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .analyze-wrap p  { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
  .analyze-controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  select.ticker-select {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: 0.04em;
    outline: none;
    cursor: pointer;
  }
  textarea.paste-area {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: #cbd5e1;
    padding: 14px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    font-family: var(--sans);
    transition: border-color 0.15s;
  }
  textarea.paste-area:focus { border-color: var(--accent); }
  .result-mini {
    margin-top: 14px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 16px;
  }
  .result-mini-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .result-mini-ticker {
    font-family: var(--mono);
    font-weight: 800;
    color: #fff;
    font-size: 16px;
  }
  .result-mini-summary {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 10px;
  }
  .view-detail-link {
    background: none; border: none;
    color: var(--accent); font-size: 11px;
    font-weight: 600; cursor: pointer;
    font-family: var(--sans);
    padding: 0; margin-top: 8px;
    display: block;
    transition: opacity 0.15s;
  }
  .view-detail-link:hover { opacity: 0.75; }

  /* ── LOG TAB ── */
  .log-wrap { max-width: 640px; }
  .log-wrap h3 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 16px; }
  .log-empty { font-size: 13px; color: var(--muted); }
  .log-entry {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .log-left { display: flex; gap: 12px; align-items: center; }
  .log-ticker { font-family: var(--mono); font-weight: 800; color: #fff; min-width: 50px; font-size: 13px; }
  .log-count { font-size: 10px; color: var(--muted); }
  .log-manual { font-size: 9px; color: #7c3aed; font-weight: 700; letter-spacing: 0.08em; }
  .log-time { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  /* ── PORTFOLIO PULSE ── */
  .pulse-section {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pulse-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .pulse-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 800;
  }

  /* ── SETUP BANNER ── */
  .setup-banner {
    background: linear-gradient(135deg, #1e1b4b, #0f172a);
    border: 1px solid #312e81;
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }
  .setup-banner-text h4 { font-size: 14px; font-weight: 700; color: #c7d2fe; margin-bottom: 4px; }
  .setup-banner-text p  { font-size: 12px; color: #818cf8; line-height: 1.5; }
  .setup-steps { display: flex; gap: 8px; flex-wrap: wrap; }
  .setup-step {
    font-size: 10px;
    background: #1e1b4b;
    border: 1px solid #3730a3;
    color: #a5b4fc;
    padding: 4px 10px;
    border-radius: 12px;
    font-family: var(--mono);
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
  .empty-state p  { font-size: 13px; line-height: 1.6; max-width: 400px; margin: 0 auto 20px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .header { padding: 0 16px; }
    .search-section { padding: 12px 16px; flex-wrap: wrap; }
    .tabs { padding: 0 16px; overflow-x: auto; }
    .main { padding: 16px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .grid { grid-template-columns: 1fr; }
    .detail-grid2 { grid-template-columns: 1fr; }
    .detail-grid4 { grid-template-columns: repeat(2, 1fr); }
    .logo-sub { display: none; }
    .setup-banner { flex-direction: column; }
  }

  /* ── VIX METER ── */
  .vix-banner {
    background: #0f0f0f;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .vix-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .vix-value { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 700; line-height: 1; }
  .vix-zone  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; letter-spacing: 0.05em; }
  .vix-advice { font-size: 12px; color: #94a3b8; flex: 1; min-width: 200px; }
  .vix-track  { flex: 1; min-width: 160px; max-width: 260px; height: 6px; background: linear-gradient(to right, #22c55e, #eab308, #f97316, #ef4444, #7f1d1d); border-radius: 3px; position: relative; }
  .vix-needle { position: absolute; top: -4px; width: 3px; height: 14px; background: white; border-radius: 2px; transform: translateX(-50%); }
  .vix-low      { color: #4ade80; }
  .vix-normal   { color: #86efac; }
  .vix-elevated { color: #fde047; }
  .vix-high     { color: #fb923c; }
  .vix-extreme  { color: #ef4444; }
  .vix-crisis   { color: #dc2626; }
  .zone-low      { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
  .zone-normal   { background: #052e16; color: #86efac; border: 1px solid #166534; }
  .zone-elevated { background: #422006; color: #fde047; border: 1px solid #713f12; }
  .zone-high     { background: #431407; color: #fb923c; border: 1px solid #7c2d12; }
  .zone-extreme  { background: #3b0000; color: #ef4444; border: 1px solid #7f1d1d; }
  .zone-crisis   { background: #450a0a; color: #dc2626; border: 1px solid #991b1b; }

  /* ── ANALYST TARGET PILL ── */
  .target-pill {
    display: inline-flex;
    align-items: center;

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG — edit GITHUB_USER and GITHUB_REPO to match yours after setup
// ═══════════════════════════════════════════════════════════════════════════
const GITHUB_USER   = 'ryan7283';
const GITHUB_REPO   = 'signal-sentiment';
// GitHub Pages serves files directly — no auth needed, cache-busted with timestamp
const RESULTS_URL   = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/data/results.json`;
const WATCHLIST_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/watchlist.json`;

// ── GITHUB TOKEN (needed to save watchlist changes back to GitHub) ──────────
// Create a free token at: github.com/settings/tokens
// Click "Generate new token (classic)" → check "repo" scope → copy and paste below
const GITHUB_TOKEN = localStorage.getItem('signal_github_token') || '';

// WATCHLIST is loaded dynamically from watchlist.json in your GitHub repo
let WATCHLIST = [];

// INST_DATA removed — using live Quiver Quant data from results.json

// ── STATE ─────────────────────────────────────────────────────────────────
let results    = {};
let loading    = {};
let activeTab  = 'overview';
let selectedTicker = null;
let activityLog = [];
let runningAll = false;
let dataSource = 'demo'; // 'github' | 'demo'

// ── BOOT ──────────────────────────────────────────────────────────────────
(async function init() {
  await loadWatchlistFromGitHub();
  await loadGitHubResults();
  render();
})();

async function loadWatchlistFromGitHub() {
  try {
    const res = await fetch(WATCHLIST_URL + '?t=' + Date.now(), {
      headers: GITHUB_TOKEN ? { Authorization: `token ${GITHUB_TOKEN}` } : {}
    });
    if (!res.ok) throw new Error('failed');
    const json = await res.json();
    const data = JSON.parse(atob(json.content.replace(/\n/g, '')));
    WATCHLIST = (data.tickers || []).map(t => ({ ticker: t.ticker, name: t.name, type: t.type || 'stock' }));
    console.log('Watchlist loaded:', WATCHLIST.length, 'tickers');
  } catch(e) {
    console.warn('Could not load watchlist from GitHub, using defaults:', e.message);
    WATCHLIST = [
      { ticker: 'PLTR',  name: 'Palantir Technologies',         type: 'stock', sector: 'AI Software & Defense Tech' },
      { ticker: 'IREN',  name: 'Iris Energy',                   type: 'stock', sector: 'AI Infrastructure & Bitcoin Mining' },
      { ticker: 'KEEL',  name: 'Keelvar',                       type: 'stock', sector: 'AI Supply Chain Software' },
      { ticker: 'CRWD',  name: 'CrowdStrike Holdings',          type: 'stock', sector: 'Cybersecurity' },
      { ticker: 'AMZN',  name: 'Amazon',                        type: 'stock', sector: 'E-Commerce & Cloud' },
      { ticker: 'OPEN',  name: 'Opendoor Technologies',         type: 'stock', sector: 'PropTech & Real Estate AI' },
      { ticker: 'QXO',   name: 'QXO Inc',                       type: 'stock', sector: 'Building Products Distribution' },
      { ticker: 'APLD',  name: 'Applied Digital',               type: 'stock', sector: 'AI Infrastructure & HPC' },
      { ticker: 'AIPO',  name: 'AI Powered Equity ETF',         type: 'etf',   sector: 'AI-Powered Equity ETF' },
      { ticker: 'QQQM',  name: 'Invesco Nasdaq-100 ETF',        type: 'etf',   sector: 'Mega-Cap Tech ETF' },
      { ticker: 'IBIT',  name: 'iShares Bitcoin ETF',           type: 'etf',   sector: 'Bitcoin ETF' },
      { ticker: 'ARKQ',  name: 'ARK Autonomous Technology ETF', type: 'etf',   sector: 'Autonomous Technology & Robotics ETF' },
      { ticker: 'FOTO',  name: 'FOTO ETF',                      type: 'etf',   sector: 'Photography & Imaging ETF' },
      { ticker: 'NASA',  name: 'Procure Space ETF',             type: 'etf',   sector: 'Space Industry ETF' },
    ];
  }
}

async function saveWatchlistToGitHub() {
  if (!GITHUB_TOKEN) {
    alert('No GitHub token set. Click the ⚙️ button in the top right to add your token.');
    return false;
  }
  try {
    // Get current file SHA (needed for updates)
    const getRes = await fetch(WATCHLIST_URL, {
      headers: { Authorization: `token ${GITHUB_TOKEN}` }
    });
    const getJson = await getRes.json();
    const sha = getJson.sha;

    // Build updated watchlist data
    const data = {
      lastUpdated: new Date().toISOString().slice(0,10),
      tickers: WATCHLIST.map(w => ({
        ticker: w.ticker,
        name: w.name,
        type: w.type || 'stock',
        sector: w.sector || '',
        query: w.query || `$${w.ticker} OR #${w.ticker} OR "${w.name}"`
      }))
    };

    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const putRes = await fetch(WATCHLIST_URL, {
      method: 'PUT',
      headers: {
        Authorization: `token ${GITHUB_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Update watchlist: ${new Date().toISOString().slice(0,10)}`,
        content: encoded,
        sha: sha
      })
    });

    if (!putRes.ok) {
      const err = await putRes.json();
      console.error('Save failed:', err);
      return false;
    }
    return true;
  } catch(e) {
    console.error('Save error:', e);
    return false;
  }
}

async function loadGitHubResults() {
  if (GITHUB_USER === 'REPLACEME') {
    dataSource = 'demo';
    document.getElementById('lastUpdated').textContent = 'Demo mode — add your GitHub username to activate';
    return;
  }
  try {
    // Use GitHub API with raw accept header — always fresh, no CDN caching
    // Direct GitHub Pages fetch — no auth needed, cache busted with timestamp
    const res = await fetch(RESULTS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('GitHub Pages returned ' + res.status);
    const data = await res.json();
    if (data.results && data.results.length > 0) {
      data.results.forEach(r => { results[r.ticker] = r; });
      dataSource = 'github';
      renderVIXBanner(data.vix);
      const d = new Date(data.generatedAt);
      document.getElementById('lastUpdated').textContent =
        'Last scan: ' + d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) +
        ' ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
      updatePulse();
    }
  } catch(e) {
    console.error('loadGitHubResults error:', e.message);
    dataSource = 'demo';
    document.getElementById('lastUpdated').textContent = 'Could not load scan data — ' + e.message;
  }
}

// ── SENTIMENT ANALYSIS via Claude API ─────────────────────────────────────
async function analyzeTicker(ticker, posts, isManual = false) {
  loading[ticker] = true;
  render();

  const block = posts.slice(0, 30).map((t, i) => `${i+1}. "${t}"`).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content:
          `You are a financial sentiment analysis engine. Analyze these social media posts about $${ticker} and return ONLY valid JSON — no markdown, no explanation, no preamble.\n\nPosts:\n${block}\n\nReturn exactly:\n{\n  "ticker": "${ticker}",\n  "sentimentScore": <float -1.0 to 1.0>,\n  "signal": <"STRONG_BUY"|"BUY"|"NEUTRAL"|"SELL"|"STRONG_SELL">,\n  "bullCount": <int>,\n  "bearCount": <int>,\n  "neutralCount": <int>,\n  "keyThemes": [<3-5 short strings>],\n  "topBullish": <most bullish post verbatim or null>,\n  "topBearish": <most bearish post verbatim or null>,\n  "summary": <2-sentence analyst summary>,\n  "confidence": <"high"|"medium"|"low">,\n  "analyzedAt": "${new Date().toISOString()}"\n}`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '{}';
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    results[ticker] = parsed;
    activityLog.unshift({ ticker, time: new Date().toLocaleTimeString(), signal: parsed.signal, postCount: posts.length, isManual, score: parsed.sentimentScore });
    if (activityLog.length > 30) activityLog.pop();
    updatePulse();
  } catch(e) {
    results[ticker] = { error: true, ticker, signal: 'NEUTRAL', sentimentScore: 0 };
  }
  loading[ticker] = false;
  render();
}

async function searchTicker() {
  const raw = document.getElementById('searchInput').value.trim().toUpperCase().replace(/^$/, '');
  if (!raw) return;
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('searchBtn').textContent = 'Searching...';

  // Add to watchlist if not already there
  if (!WATCHLIST.find(w => w.ticker === raw)) {
    WATCHLIST.push({ ticker: raw, name: raw });
  }

  // Use sample posts or generic placeholder posts
  const posts = SAMPLE_POSTS[raw] || [
    `$${raw} is getting a lot of attention right now. Worth watching closely.`,
    `Anyone tracking $${raw}? The chart looks interesting at this level.`,
    `$${raw} fundamentals are improving quarter over quarter. Bullish long term.`,
    `Not sure about $${raw} at this valuation. Seems stretched to me.`,
    `$${raw} management has been executing well. Adding to my position.`,
  ];

  selectedTicker = raw;
  activeTab = 'overview';
  await analyzeTicker(raw, posts);

  document.getElementById('searchBtn').disabled = false;
  document.getElementById('searchBtn').textContent = 'Analyze →';
  document.getElementById('searchInput').value = '';
}

function renderVIXBanner(vix) {
  // Store vix globally for inline rendering
  window._vixData = vix;
  const el = document.getElementById('vixBanner');
  if (!el) return;
  if (!vix || !vix.value) {
    el.style.display = 'none';
    return;
  }
  // Needle position: VIX 0-50 maps to 0-100%, capped
  const pct = Math.min(Math.max((vix.value / 50) * 100, 2), 98);
  el.innerHTML = '<div>'
    + '<div class="vix-label">VIX — Fear & Greed</div>'
    + '<div class="vix-value vix-' + vix.zone + '">' + vix.value.toFixed(1) + '</div>'
    + '</div>'
    + '<span class="vix-zone zone-' + vix.zone + '">' + vix.label + '</span>'
    + '<div class="vix-track"><div class="vix-needle" style="left:' + pct + '%"></div></div>'
    + '<div class="vix-advice">' + vix.advice + '</div>';
}

function renderVIXBannerInline() {
  const vix = window._vixData;
  if (!vix || !vix.value) return '';
  const pct = Math.min(Math.max((vix.value / 50) * 100, 2), 98);
  return '<div class="vix-banner">'
    + '<div><div class="vix-label">VIX — Fear Gauge</div><div class="vix-value vix-' + vix.zone + '">' + vix.value.toFixed(1) + '</div></div>'
    + '<span class="vix-zone zone-' + vix.zone + '">' + vix.label + '</span>'
    + '<div class="vix-track"><div class="vix-needle" style="left:' + pct + '%"></div></div>'
    + '<div class="vix-advice">' + vix.advice + '</div>'
    + '</div>';
}

async function runAll() {
  if (runningAll) return;
  runningAll = true;
  document.getElementById('runAllBtn').disabled = true;
  document.getElementById('runAllBtn').textContent = '⟳ Scanning...';

  for (const { ticker } of WATCHLIST) {
    const posts = SAMPLE_POSTS[ticker] || getGenericPosts(ticker);
    await analyzeTicker(ticker, posts);
    await sleep(300);
  }

  runningAll = false;
  document.getElementById('runAllBtn').disabled = false;
  document.getElementById('runAllBtn').textContent = '⚡ Full Scan';
}

function getGenericPosts(ticker) {
  return [
    `$${ticker} showing momentum today. Watching for a breakout above key resistance.`,
    `Accumulated more $${ticker} on the dip. High conviction here.`,
    `$${ticker} earnings next quarter — guidance will be everything.`,
    `Not impressed with $${ticker} recent numbers. Trimming my position.`,
    `$${ticker} is exactly the kind of name I want in a risk-on environment.`,
  ];
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── PULSE ─────────────────────────────────────────────────────────────────
function updatePulse() {
  const scored = Object.values(results).filter(r => !r.error && r.sentimentScore !== undefined);
  if (!scored.length) return;
  const avg = scored.reduce((s,r) => s + r.sentimentScore, 0) / scored.length;
  const el = document.getElementById('portfolioPulse');
  const vl = document.getElementById('pulseVal');
  el.style.display = 'flex';
  const color = avg > 0.15 ? '#22c55e' : avg < -0.15 ? '#ef4444' : '#f59e0b';
  vl.style.color = color;
  vl.textContent = (avg > 0 ? '▲ +' : '▼ ') + avg.toFixed(2);
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  selectedTicker = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab)?.classList.add('active');
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('mainContent');

  if (activeTab === 'overview') {
    if (selectedTicker && results[selectedTicker] && !results[selectedTicker].error) {
      main.innerHTML = renderDetail(selectedTicker);
    } else {
      main.innerHTML = renderOverview();
    }
  } else if (activeTab === 'analyze') {
    main.innerHTML = renderAnalyze();
    attachAnalyzeListeners();
  } else if (activeTab === 'log') {
    main.innerHTML = renderLog();
  }
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────
function renderOverview() {
  const analyzed = Object.keys(results).length;
  const bulls = Object.values(results).filter(r => ['BUY','STRONG_BUY'].includes(r.signal)).length;
  const bears = Object.values(results).filter(r => ['SELL','STRONG_SELL'].includes(r.signal)).length;

  const banner = dataSource === 'demo' ? `
    <div class="setup-banner">
      <div class="setup-banner-text">
        <h4>📡 Live data not connected — showing demo mode</h4>
        <p>Your daily scan results will appear here automatically once you complete GitHub setup.</p>
      </div>
      <div class="setup-steps">
        <span class="setup-step">1. Upload files to GitHub</span>
        <span class="setup-step">2. Add API keys to Secrets</span>
        <span class="setup-step">3. Run first scan</span>
      </div>
    </div>` : '';

  const vixHtml = (typeof renderVIXBannerInline === 'function') ? renderVIXBannerInline() : '';

  const stats = `
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Tickers Tracked</div>
        <div class="stat-value">${WATCHLIST.length}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Analyzed Today</div>
        <div class="stat-value">${analyzed}<span style="font-size:16px;color:var(--muted)"> / ${WATCHLIST.length}</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Bullish Signals</div>
        <div class="stat-value green">${bulls}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Bearish Signals</div>
        <div class="stat-value red">${bears}</div>
      </div>
    </div>`;

  const cards = WATCHLIST.map(({ticker, name}) => renderCard(ticker, name)).join('');

  return banner + vixHtml + stats + `<div class="grid">${cards}</div>`;
}


function renderCard(ticker, name) {
  const r = results[ticker];
  const isLoading = loading[ticker];
  // Live institutional data comes from results.json via r.institutional
  const inst = null; // static INST_DATA removed

  let sentiment = '';
  if (r && !r.error) {
    const sig = r.signal;
    sentiment = sig === 'STRONG_BUY' || sig === 'BUY' ? 'bullish' :
                sig === 'STRONG_SELL' || sig === 'SELL' ? 'bearish' : 'neutral-card';
  }

  let body = '';
  if (isLoading) {
    body = `<div class="shimmer"><div class="shimmer-bar"></div></div><div style="font-size:11px;color:var(--muted)">Analyzing posts...</div>`;
  } else if (r && !r.error) {
    const composite   = r.compositeScore ?? r.sentimentScore;
    const pct          = ((composite + 1) / 2) * 100;
    const barClass     = composite > 0.15 ? 'green' : composite < -0.15 ? 'red' : 'amber';
    const valColor     = composite > 0.15 ? 'var(--green)' : composite < -0.15 ? 'var(--red)' : 'var(--amber)';
    const scoreStr     = (composite > 0 ? '+' : '') + composite.toFixed(2);
    const arrow        = r.arrow || '→';
    const arrowClass   = arrow === '↑' ? 'trend-up' : arrow === '↓' ? 'trend-down' : 'trend-flat';
    const delta        = r.sentimentDelta || 0;
    const deltaClass   = delta > 0.05 ? 'delta-up' : delta < -0.05 ? 'delta-down' : 'delta-flat';
    const deltaStr     = (delta > 0 ? '+' : '') + delta.toFixed(2);
    const themes       = (r.keyThemes||[]).slice(0,3).map(t => `<span class="theme">${t}</span>`).join('');
    const instData     = r.institutional;
    const instChip     = instData ? (() => {

async function analyzeManual() {
  const custom = document.getElementById('customTicker')?.value.trim().toUpperCase().replace(/^$/,'');
  const select = document.getElementById('manualTicker')?.value;
  const ticker = custom || select;
  const text   = document.getElementById('manualText')?.value || '';
  const posts  = text.split('\n').map(l=>l.trim()).filter(Boolean);
  if (!posts.length || !ticker) return;

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('analyzeBtn').textContent = 'Analyzing...';
  loading['__manual'] = true;
  render();

  const block = posts.slice(0,30).map((t,i)=>`${i+1}. "${t}"`).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content:
          `You are a financial sentiment analysis engine. Analyze these ${posts.length} social media posts about $${ticker} and return ONLY valid JSON.\n\nPosts:\n${block}\n\nReturn exactly:\n{"ticker":"${ticker}","sentimentScore":<float -1 to 1>,"signal":<"STRONG_BUY"|"BUY"|"NEUTRAL"|"SELL"|"STRONG_SELL">,"bullCount":<int>,"bearCount":<int>,"neutralCount":<int>,"keyThemes":[<3-5 strings>],"topBullish":<string or null>,"topBearish":<string or null>,"summary":<2 sentences>,"confidence":<"high"|"medium"|"low">,"analyzedAt":"${new Date().toISOString()}"}`
        }]
      })
    });
    const data = await res.json();
    const parsed = JSON.parse(data.content?.find(b=>b.type==='text')?.text.replace(/```json|```/g,'').trim() || '{}');
    results['__manual'] = parsed;
    activityLog.unshift({ ticker, time: new Date().toLocaleTimeString(), signal: parsed.signal, postCount: posts.length, isManual: true, score: parsed.sentimentScore });
  } catch(e) {
    results['__manual'] = { error: true };
  }
  loading['__manual'] = false;
  switchTab('analyze');

  const btn = document.getElementById('analyzeBtn');
  if (btn) { btn.disabled = false; btn.textContent = 'Analyze →'; }
}

function selectTickerManual() {
  const r = results['__manual'];
  if (!r || r.error) return;
  const ticker = r.ticker;
  if (!results[ticker]) results[ticker] = r;
  if (!WATCHLIST.find(w=>w.ticker===ticker)) WATCHLIST.push({ticker, name: ticker});
  selectedTicker = ticker;
  activeTab = 'overview';
  render();
}

async function addTickerFromModal() {
  const ticker = document.getElementById('newTickerInput').value.trim().toUpperCase().replace(/^$/, '');
  const name   = document.getElementById('newTickerName').value.trim() || ticker;
  const type   = document.getElementById('newTickerType')?.value || 'stock';
  if (!ticker) return;
  if (WATCHLIST.find(w => w.ticker === ticker)) {
    document.getElementById('newTickerInput').value = '';
    document.getElementById('newTickerName').value = '';
    return;
  }
  WATCHLIST.push({ ticker, name, type, query: `$${ticker} OR #${ticker} OR "${name}"` });
  document.getElementById('newTickerInput').value = '';
  document.getElementById('newTickerName').value = '';

  const saveBtn = document.getElementById('saveWatchlistBtn');
  if (saveBtn) { saveBtn.textContent = 'Saving...'; saveBtn.disabled = true; }
  const saved = await saveWatchlistToGitHub();
  if (saveBtn) {
    saveBtn.textContent = saved ? '✓ Saved to GitHub' : '⚠ Save failed — check token';
    saveBtn.disabled = false;
    setTimeout(() => { if(saveBtn) saveBtn.textContent = 'Save to GitHub'; }, 3000);
  }
  renderModalList();
}

async function removeTicker(index) {
  const ticker = WATCHLIST[index].ticker;
  WATCHLIST.splice(index, 1);
  delete results[ticker];
  const saved = await saveWatchlistToGitHub();
  renderModalList();
  if (!saved) alert('Could not save to GitHub — check your token in settings.');
}

function promptGitHubToken() {
  const current = localStorage.getItem('signal_github_token') || '';
  const token = prompt(
    'Paste your GitHub Personal Access Token below.\n\n' +
    'To create one (free):\n' +
    '1. Go to github.com/settings/tokens\n' +
    '2. Click "Generate new token (classic)"\n' +
    '3. Name it "signal-sentiment"\n' +
    '4. Check the "repo" checkbox\n' +
    '5. Click "Generate token" and copy it here',
    current
  );
  if (token !== null) {
    localStorage.setItem('signal_github_token', token);
    alert(token ? 'Token saved! You can now save watchlist changes.' : 'Token cleared.');
  }
}
